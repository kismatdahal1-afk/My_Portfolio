<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0b1a;
      font-family: 'Segoe UI', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrapper {
      max-width: 560px;
      margin: 24px auto;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1e2a45;
    }
    .header {
      background: linear-gradient(135deg, #0b0b1a, #16163a);
      padding: 32px 30px 28px;
      border-bottom: 2px solid #00d4ff;
      text-align: center;
    }
    .header-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .header img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid #00d4ff;
      box-shadow: 0 0 20px rgba(0,212,255,0.35);
      object-fit: cover;
    }
    .header-text {
      text-align: center;
    }
    .header-text h1 {
      color: #00d4ff;
      font-size: 20px;
      letter-spacing: 0.03em;
    }
    .header-text p {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 2px;
    }
    .body {
      background: #111126;
      padding: 32px 30px;
    }
    .field-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #64748b;
      padding: 16px 0 4px;
    }
    .field-value {
      font-size: 14px;
      color: #f1f5f9;
      padding: 4px 0 14px;
      border-bottom: 1px solid #1e2a45;
      line-height: 1.5;
    }
    .field-value a {
      color: #00d4ff;
      text-decoration: none;
    }
    .field-value a:hover {
      text-decoration: underline;
    }
    .footer {
      text-align: center;
      padding-top: 28px;
    }
    .badge {
      display: inline-block;
      background: #00d4ff;
      color: #0b0b1a;
      font-weight: 800;
      font-size: 11px;
      padding: 4px 14px;
      border-radius: 20px;
    }
    .footer p {
      color: #475569;
      font-size: 11px;
      margin-top: 14px;
    }
    @media only screen and (max-width:480px) {
      .wrapper { margin: 12px; }
      .header { padding: 20px; }
      .body { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="header-inner">
        <img src="https://kismatp.vercel.app/assets/images/i.jpeg" alt="KD" />
        <div class="header-text">
          <h1>✦ New Portfolio Message</h1>
          <p>Someone reached out from your website</p>
        </div>
      </div>
    </div>
    <div class="body">
      <div class="field-label">Name</div>
      <div class="field-value">{{name}}</div>
      <div class="field-label">Contact</div>
      <div class="field-value">{{contact}}</div>
      <div class="field-label">Email</div>
      <div class="field-value"><a href="mailto:{{email}}">{{email}}</a></div>
      <div class="field-label">Message</div>
      <div class="field-value" style="white-space:pre-wrap;">{{message}}</div>
      <div class="footer">
        <span class="badge">Portfolio Contact</span>
        <p>Sent from your portfolio website &mdash; Kismat Dahal</p>
      </div>
    </div>
  </div>
</body>
</html>
